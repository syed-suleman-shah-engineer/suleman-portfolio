title: "Syed Suleman Shah — Dev Blog"
description: "Build logs, case studies, and Unity dev notes from WitShells Studio."
url: "https://suleman.witshells.com"
baseurl: "/blog"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:slug/
# permalink: pretty

# theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

author:
  name: "Syed Suleman Shah"
  email: "Sayedsulaiman607@gmail.com"

logo: /images/witchess.png

lang: en
twitter:
  username: ""
social:
  name: "Syed Suleman Shah"
  links:
    - https://www.linkedin.com/in/syed-suleman-shah/
    - https://www.fiverr.com/s/DB46vDV

future: true
timezone: Asia/Karachi