title: "Syed Suleman Shah — Dev Blog"
description: "Build logs, case studies, and Unity dev notes from WitShells Studio."
url: "https://suleman.witshells.com"
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: /:slug/

# theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  unity_course:
    output: true
    permalink: /unity-course/:path/
  unity_beginner:
    output: true
    permalink: /unity-beginner/:path/
  unity_master:
    output: true
    permalink: /unity-master/:path/
  unity_game:
    output: true
    permalink: /unity-game/:path/
  jetfight:
    output: true
    permalink: /jetfight/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "unity_course"
    values:
      layout: lesson
  - scope:
      path: ""
      type: "unity_beginner"
    values:
      layout: lesson
  - scope:
      path: ""
      type: "unity_master"
    values:
      layout: lesson
  - scope:
      path: ""
      type: "unity_game"
    values:
      layout: lesson
  - scope:
      path: ""
      type: "jetfight"
    values:
      layout: lesson
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - PRIVATE_COLLECTION_SETUP_GUIDE.md

author:
  name: "Syed Suleman Shah"
  email: "Sayedsulaiman607@gmail.com"

logo: /images/suleman.png

lang: en
twitter:
  username: "WitShells0"
social:
  name: "Syed Suleman Shah"
  links:
    - https://www.linkedin.com/in/syed-suleman-shah/
    - https://www.fiverr.com/s/DB46vDV

future: true
timezone: Asia/Karachi
